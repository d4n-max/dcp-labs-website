    <text x="70" y="126" fill="white" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="850" letter-spacing="-7">DC</text>
    <text x="141" y="126" fill="url(#pGlow)" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="850" letter-spacing="-6">P</text>
    <circle cx="158" cy="109" r="31" fill="#ED64A6" fill-opacity="0.28" filter="url(#pinkBlur)"/>
  </g>
  <text x="252" y="133" fill="white" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="850" letter-spacing="-3">DCP</text>
  <rect x="426" y="63" width="2.5" height="90" rx="1.25" fill="white" fill-opacity="0.42"/>
  <text x="462" y="133" fill="white" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="300" letter-spacing="-2.5">LABS</text>
  <defs>
    <linearGradient id="markFill" x1="34" y1="26" x2="202" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35106B"/>
      <stop offset="0.46" stop-color="#160521"/>
      <stop offset="1" stop-color="#32135A"/>
    </linearGradient>
    <linearGradient id="pGlow" x1="141" y1="79" x2="183" y2="133" gradientUnits="userSpaceOnUse">
